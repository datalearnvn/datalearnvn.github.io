---
layout: default
---

<article class="post-shell">
  <div class="post-meta">{{ page.date | date: "%B %d, %Y" }}{% if page.categories %} • {{ page.categories | join: " / " }}{% endif %}</div>
  <h1>{{ page.title }}</h1>
  {% if page.subtitle %}<p class="subtitle">{{ page.subtitle }}</p>{% endif %}
  {% if page.image %}<img class="post-cover" src="{{ page.image }}" alt="{{ page.title }}" />{% endif %}
  <div class="post-content">
    {{ content }}
  </div>
</article>
